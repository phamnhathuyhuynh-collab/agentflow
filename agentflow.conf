<VirtualHost *:80>
    ServerName agentflow.local
    DocumentRoot /var/www/agentflow/public

    <Directory /var/www/agentflow/public>
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/agentflow_error.log
    CustomLog ${APACHE_LOG_DIR}/agentflow_access.log combined
</VirtualHost>
